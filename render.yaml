services:
  - type: web
    name: mc-bot
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: BOT_HOST
        sync: false
      - key: BOT_PORT
        value: "25565"
      - key: BOT_USERNAME
        sync: false
      - key: BOT_PASSWORD_INGAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: API_PORT
        value: "3001"
      - key: PORT
        value: "3000"
      - key: DASHBOARD_URL
        sync: false
      - key: REPO_URL
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
